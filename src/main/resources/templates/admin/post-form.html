<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:markdown="http://www.example.org/thymeleaf"
	th:replace="~{layouts/base :: layout(~{::title}, ~{::content}, ~{::styles})}">
<head>
<title>Spring Writer</title>

<th:block th:fragment="styles">
	<link rel="stylesheet" th:href="@{/css/admin-post-form.css}" />
</th:block>
</head>
<body>

	<div th:fragment="content">
		<section class="post-form-section">

	<h1 class="form-title"
		th:text="${post != null} ? 'Editar Post' : 'Nuevo Post'"></h1>

	<form class="post-form"
		th:action="${post != null}
                 ? @{/admin/posts/{id}/edit(id=${post.id})}
                 : @{/admin/posts/new}"
		method="POST">

		<div class="form-group">
			<label for="title">Título</label>
			<input class="form-input" type="text" id="title"
				name="title" required maxlength="255"
				th:value="${post?.title}" />
		</div>

		<div class="form-group">
			<label for="excerpt">Extracto</label>
			<textarea class="form-textarea" id="excerpt"
				name="excerpt" rows="3"
				th:text="${post?.excerpt}"></textarea>
		</div>

		<div class="form-group">
			<label for="contentMd">Contenido (Markdown)</label>
			<textarea class="form-textarea" id="contentMd"
				name="contentMd" rows="15" required
				th:text="${post?.contentMd}"></textarea>
		</div>

		<div class="form-group">
			<label for="categoryId">Categoría</label>
			<select class="form-select" id="categoryId"
				name="categoryId">
				<option value="">Sin categoría</option>
				<option th:each="cat : ${categories}"
					th:value="${cat.id}"
					th:text="${cat.name}"
					th:selected="${post?.category != null and post.category.id == cat.id}">
				</option>
			</select>
		</div>

		<div class="form-group">
			<label>Tags</label>

			<div class="tags-list">
				<div class="tag-item" th:each="tag : ${tags}">
					<input type="checkbox"
						name="tagIds"
						th:value="${tag.id}"
						th:id="${'tag-' + tag.id}"
						th:checked="${post?.tags != null and #lists.contains(post.tags, tag)}" />

					<label th:for="${'tag-' + tag.id}"
						th:text="${tag.name}"></label>
				</div>
			</div>
		</div>

		<div class="form-group">
			<label for="status">Estado</label>
			<select class="form-select" id="status" name="status">
				<option value="DRAFT"
					th:selected="${post == null or post.status?.name() == 'DRAFT'}">
					Borrador
				</option>
				<option value="PUBLISHED"
					th:selected="${post?.status?.name() == 'PUBLISHED'}">
					Publicado
				</option>
			</select>
		</div>

		<button class="form-button" type="submit"
			th:text="${post != null} ? 'Guardar cambios' : 'Crear post'">
		</button>

		<div class="form-actions">
			<a class="form-link"
				th:if="${post != null}"
				th:href="@{/admin/posts/{id}/comments(id=${post.id})}">
				Ver comentarios
			</a>

			<a class="form-link"
				th:href="@{/admin/posts}">
				Cancelar
			</a>
		</div>

	</form>
</section>
	</div>

</body>
</html>
