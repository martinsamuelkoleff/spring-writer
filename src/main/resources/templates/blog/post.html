<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:markdown="http://www.example.org/thymeleaf"
    th:replace="~{layouts/base :: layout(~{::title}, ~{::content}, ~{::styles})}">
<head>
<title th:text="${post.title}">Spring Writer</title>
 <th:block th:fragment="styles">
        <link rel="stylesheet" th:href="@{/css/post.css}"/>
    </th:block>
</head>
<body>

	<div th:fragment="content" class="post-container">

    <article class="post">
       
        <div class="post-header">
         	<a class="back-link" th:href="@{/blog}">Volver</a>
            <h1 th:text="${post.title}"></h1>
            <time th:text="${#temporals.format(post.publishedAt, 'dd MMM yyyy')}"
                  th:datetime="${post.publishedAt}"></time>
        </div>

        <section class="post-content">
            <div markdown:toHtml="${markdownContent}"></div>
        </section>

    </article>

    <section class="comments">

        <h2>
            Comentarios (<span th:text="${comments.totalElements}"></span>)
        </h2>

        <div class="comment" th:each="comment : ${comments}">
            <div class="comment-header">
                <strong th:text="${comment.authorName}"></strong>
                <time th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy')}"></time>
            </div>
            <p th:text="${comment.body}"></p>
        </div>

        <p th:if="${comments.isEmpty()}">Todavía no hay comentarios.</p>

        <nav class="pagination" th:if="${comments.totalPages > 1}">
            <a th:if="${!comments.first}"
               th:href="@{/blog/{slug}(slug=${post.slug}, page=${comments.number - 1})}">
                &larr;
            </a>

            <span th:each="i : ${#numbers.sequence(0, comments.totalPages - 1)}">
                <a th:href="@{/blog/{slug}(slug=${post.slug}, page=${i})}"
                   th:text="${i + 1}"
                   th:classappend="${i == comments.number} ? 'active'">
                </a>
            </span>

            <a th:if="${!comments.last}"
               th:href="@{/blog/{slug}(slug=${post.slug}, page=${comments.number + 1})}">
                &rarr;
            </a>
        </nav>
        
         <div class="comment-form">
            <h3>Dejá un comentario</h3>

            <form th:action="@{'/blog/' + ${post.slug} + '/comments'}" method="post" onsubmit="alert('Tu comentario fue enviado y está pendiente de aprobación.')">
                
                <div class="form-group">
                    <label th:for="authorName">Nombre</label>
                    <input type="text" th:id="authorName" name="authorName" required maxlength="150" />
                </div>

                <div class="form-group">
                    <label th:for="email">Email</label>
                    <input type="email" th:id="email" name="authorEmail" required maxlength="150" />
                </div>

                <div class="form-group">
                    <label th:for="comentario">Comentario</label>
                    <textarea name="body" th:id="comentario" required rows="4" maxlength="400" ></textarea>
                </div>
                
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <button type="submit">Enviar comentario</button>
            </form>
        </div>
    </section>

</div>
</body>
</html>
